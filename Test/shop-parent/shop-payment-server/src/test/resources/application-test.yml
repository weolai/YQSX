server:
  port: 0
spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:shop_payment;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    schema: classpath:schema-h2.sql
    initialization-mode: always
  redis:
    host: localhost
    port: 6379
  cloud:
    nacos:
      discovery:
        enabled: false
      config:
        enabled: false

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: is_deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

feign:
  sentinel:
    enabled: false

spring.cloud.sentinel.enabled: false
sentinel.rule.enabled: false
