server:
  port: 8091
  tomcat:
    threads:
      max: 10
spring:
  redis:
    host: localhost
    port: 6379
    database: 0
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/shop-order?serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true&useUnicode=true&characterEncoding=utf-8
    username: root
    password: 1234
    schema: classpath:schema-mysql.sql
    initialization-mode: always
    continue-on-error: true
  cloud:
    sentinel:
      transport:
        port: 8719

# Ribbon负载均衡策略配置（自定义版本优先策略）
shop-product-service:
  ribbon:
    NFLoadBalancerRuleClassName: com.gec.shop.order.ribbon.VersionPriorityRule

# Feign超时时间配置 + 开启Feign对Sentinel的支持
feign:
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 5000
  sentinel:
    enabled: true

# 链路追踪调试配置
app:
  trace:
    full-chain: true
