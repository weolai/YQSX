server:
  port: 8091
  tomcat:
    threads:
      max: 10
spring:
  main:
    lazy-initialization: true
  redis:
    host: localhost
    port: 6379
    database: 0
    lettuce:
      pool:
        max-active: 16
        max-idle: 8
        min-idle: 2
        max-wait: 3000ms
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/shop-order?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf-8
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:1234}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 3000
      idle-timeout: 600000
      max-lifetime: 1800000
    schema: classpath:schema-mysql.sql
    initialization-mode: always
    continue-on-error: true
  cloud:
    sentinel:
      transport:
        port: 8719

# Ribbon负载均衡策略配置（自定义版本优先策略）
shop-product-service:
  ribbon:
    NFLoadBalancerRuleClassName: com.gec.shop.order.ribbon.VersionPriorityRule

# Feign超时时间配置 + 开启Feign对Sentinel的支持
feign:
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 5000
  httpclient:
    enabled: true
    max-connections: 200
    max-connections-per-route: 50
    connection-timeout: 2000
  sentinel:
    enabled: true

# 链路追踪调试配置
# Sprint 2: 默认 false,保持幂等语义
# 仅压测场景手动开启 true 跳过幂等检查以强制走完整链路
app:
  trace:
    full-chain: false
