server:
  port: 8080
spring:
  main:
    lazy-initialization: true
  cloud:
    sentinel:
      transport:
        port: 8721
    gateway:
      discovery:
        locator:
          enabled: false
      routes:
        - id: shop-user-service
          uri: lb://shop-user-service
          predicates:
            - Path=/api/user/**
          filters:
            - StripPrefix=1
        - id: shop-product-service
          uri: lb://shop-product-service
          predicates:
            - Path=/api/products/**
          filters:
            - StripPrefix=1
        - id: shop-order-service
          uri: lb://shop-order-service
          predicates:
            - Path=/api/orders/**
          filters:
            - StripPrefix=1
        - id: shop-payment-service
          uri: lb://shop-payment-service
          predicates:
            - Path=/api/payment/**
          filters:
            - StripPrefix=1
        - id: shop-kg-service
          uri: http://127.0.0.1:5000
          predicates:
            - Path=/api/kg/**
          filters:
            - RewritePath=/api/kg/(?<segment>.*), /$\{segment}
        - id: time-demo
          uri: lb://shop-user-service
          predicates:
            - Path=/api/time/**
          filters:
            - RewritePath=/api/time/(?<segment>.*), /user/$\{segment}
            - RequestTime=true
        - id: demo-rewrite
          uri: lb://shop-product-service
          predicates:
            - Path=/api/demo/**
          filters:
            - RewritePath=/api/demo/(?<segment>.*), /products/$\{segment}
gateway:
  auth:
    # 白名单：登录、健康检查、注册、验证码、重置密码（匿名可访问）
    # /api/discovery/** /api/time/** /api/demo/** 已移除（内部接口不应公开暴露）
    whitelist: /api/user/login,/api/user/hello,/api/user/register,/api/user/send-code,/api/user/reset-password
