# ============================================================
# 生产环境覆盖配置 (prod profile)
# 仅覆盖与安全相关的字段,其余继承 application.yml
# ============================================================
# 安全说明:
# - DB_PASSWORD 不提供默认值,缺失即启动失败
# - 数据库连接强制 useSSL=true,禁用 allowPublicKeyRetrieval
# - 生成方式:启动时 export DB_PASSWORD=xxx 或通过 Nacos 注入
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/shop_user?serverTimezone=Asia/Shanghai&useSSL=true&verifyServerCertificate=false&useUnicode=true&characterEncoding=utf-8
    username: ${DB_USER}
    password: ${DB_PASSWORD}
