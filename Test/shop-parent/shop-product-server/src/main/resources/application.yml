server:
  port: 8081
spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/shop-product?serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true&useUnicode=true&characterEncoding=utf-8
    username: root
    password: 1234
  cloud:
    sentinel:
      transport:
        port: 8723
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

feign:
  sentinel:
    enabled: true
