server:
  port: 8081
spring:
  main:
    lazy-initialization: true
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/shop-product?serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true&useUnicode=true&characterEncoding=utf-8
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:1234}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 3000
      idle-timeout: 600000
      max-lifetime: 1800000
  cloud:
    sentinel:
      transport:
        port: 8723
  # Sentinel 本地规则开关（默认启用，可通过 Nacos 配置中心或环境变量关闭）
sentinel:
  rule:
    enabled: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

# DIN 推荐服务地址（Python FastAPI 服务）
din:
  recommend:
    url: http://127.0.0.1:8000

feign:
  sentinel:
    enabled: true
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 30000
      shop-recognition-service:
        connectTimeout: 5000
        readTimeout: 60000
      din-recommend-service:
        connectTimeout: 500
        readTimeout: 3000
